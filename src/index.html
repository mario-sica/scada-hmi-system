<!doctype html>
<html lang="it" data-theme="dark">
<head>
  <meta charset="utf-8">
  <title>SCADA HMI System</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1280">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <!-- Google Fonts — Inter + Roboto Mono -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap">
  <!-- Anti-FOUC: applica il tema salvato prima del render Angular -->
  <script>
    (function() {
      var theme = localStorage.getItem('hmi-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
